apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.database.name }}-statefulset
  namespace: {{ .Values.database.namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.database.name }}
  serviceName: {{ .Values.database.name }}-service
  replicas: 1
  template:
    metadata:
      labels:
        app: {{ .Values.database.name }}
    spec:
      containers:
      - name: {{ .Values.database.name }}
        image: {{ .Values.database.image }}
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.name }}-secret
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.name }}-secret
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.name }}-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          valueFrom:
            secretKeyRef:
              name: {{ .Values.database.name }}-secret
              key: PGDATA
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: www
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: www
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
