apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: backend
type: Opaque
stringData:
  DB_HOST: "your-db-host"
  DB_PORT: "your-db-port"
  DB_NAME: "your-db-name"
  DB_USER: "your-db-user"
  DB_PASSWORD: "your-db-password"
  JWT_SECRET: "your-jwt-secret"
  JWT_EXPIRES_IN: "7d"
  FRONTEND_URL: "your-frontend-url"
