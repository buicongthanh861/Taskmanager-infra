microservice:
  name: "frontend"
  namespace: "frontend"
  replicas: 1
  minReplicas: 1
  maxReplicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
container:
  name: "taskmanager-frontend"
  image: "congthanh19/taskmanager-frontend"
  tag: f0bcb3ae9165d0ff5e5ec21dfa18338976db207f
  imagePullPolicy: Always
workload:
  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "250m"
      memory: "256Mi"
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
service:
  type: ClusterIP
  port: 80
  targetPort: 80
